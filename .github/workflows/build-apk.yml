name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Echo build instructions
        run: |
          echo "APK 构建指南"
          echo "GitHub Actions 环境 Gradle 兼容性问题，请本地构建："
          echo "1. npm install -g @bubblewrap/cli"
          echo "2. bubblewrap init --manifest https://bbgjbjvg.github.io/fuguang-app/manifest.json"
          echo "3. bubblewrap build"