name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK with Bubblewrap
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: |
          # Generate keystore
          keytool -genkey -v -keystore $GITHUB_WORKSPACE/release.keystore \
            -alias upload -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=芙光"
          
          # Install bubblewrap
          npm install -g @bubblewrap/cli
          
          # Init TWA project (pipe answers to prompts)
          cd $GITHUB_WORKSPACE
          mkdir -p twa && cd twa
          printf '%s\n%s\n%s\n%s\n%s\n' \
            "y" \
            "$GITHUB_WORKSPACE/release.keystore" \
            "android" \
            "upload" \
            "android" \
            | bubblewrap init --manifest https://bbgjbjvg.github.io/fuguang-app/manifest.json
          
          # Build
          bubblewrap build
          
          # Collect APK
          mkdir -p $GITHUB_WORKSPACE/apk-output
          find $GITHUB_WORKSPACE -name "*.apk" -path "*/release/*" -exec cp {} $GITHUB_WORKSPACE/apk-output/ \; || echo "No APK found"
          ls -la $GITHUB_WORKSPACE/apk-output/

      - name: List all APK files
        run: |
          find $GITHUB_WORKSPACE -name "*.apk" -type f 2>/dev/null
          find $GITHUB_WORKSPACE -name "*.aab" -type f 2>/dev/null
          ls -la $GITHUB_WORKSPACE/apk-output/ 2>/dev/null || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: 芙光-APK
          path: |
            ${{ github.workspace }}/apk-output/*.apk
            ${{ github.workspace }}/apk-output/*.aab
          if-no-files-found: warn
