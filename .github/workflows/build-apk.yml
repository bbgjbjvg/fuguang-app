name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install and run pwa2apk
        run: |
          # Clone pwa2apk
          git clone https://github.com/Tonihj77-T/pwa2apk.git /tmp/pwa2apk
          cd /tmp/pwa2apk
          npm install
          
          # Skip Gradle build step (will fix Gradle config manually)
          sed -i 's/noBuild = false/noBuild = true/' src/index.js
          
          mkdir -p $GITHUB_WORKSPACE/apk-output

          # Run pwa2apk (generates project, skips Gradle build)
          node bin/pwa2apk.js \
            --url https://bbgjbjvg.github.io/fuguang-app \
            --name "芙光" \
            --package com.fuguang.app \
            --color "#E84D8A" \
            --output $GITHUB_WORKSPACE/apk-output \
            --display standalone \
            --app-version 1
          
          # Fix Gradle compatibility and build manually
          cd $GITHUB_WORKSPACE/apk-output/android-project
          echo "android.dependencyResolutionAtConfigurationTime=false" >> gradle.properties
          ./gradlew assembleRelease --no-daemon
          
          # Collect APK
          mkdir -p $GITHUB_WORKSPACE/apk-output
          find $GITHUB_WORKSPACE/apk-output -name "*.apk" -exec cp {} $GITHUB_WORKSPACE/apk-output/ \; || echo "No APK found"

      - name: List all APK files
        run: |
          find $GITHUB_WORKSPACE -name "*.apk" -type f 2>/dev/null
          find $GITHUB_WORKSPACE -name "*.aab" -type f 2>/dev/null
          ls -la $GITHUB_WORKSPACE/apk-output/ 2>/dev/null || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: 芙光-APK
          path: |
            ${{ github.workspace }}/apk-output/*.apk
            ${{ github.workspace }}/apk-output/*.aab
          if-no-files-found: warn
