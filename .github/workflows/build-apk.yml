name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install PWABuilder CLI
        run: npm install -g @pwabuilder/cli

      - name: Package APK
        run: |
          npx pwabuilder package public --platform android --output apk-output
        continue-on-error: true

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: 芙pop-APK
          path: |
            apk-output/**/*.apk
            apk-output/**/*.aab
