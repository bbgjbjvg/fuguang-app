name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install and run pwa2apk
        run: |
          # Clone pwa2apk from Tonihj77-T (TWA-based APK builder)
          git clone https://github.com/Tonihj77-T/pwa2apk.git /tmp/pwa2apk
          cd /tmp/pwa2apk
          npm install
          mkdir -p $GITHUB_WORKSPACE/apk-output

          # Run pwa2apk
          node bin/pwa2apk.js \
            --url https://9ca109cd9892499cb8718c25298d991d.app.codebuddy.work \
            --name "芙pop" \
            --package com.fupop.app \
            --color "#E84D8A" \
            --output $GITHUB_WORKSPACE/apk-output \
            --display standalone \
            --app-version 1 || echo "pwa2apk exited with error"

          ls -la $GITHUB_WORKSPACE/apk-output/ 2>/dev/null || echo "No output dir"

      - name: List all APK files
        run: |
          find $GITHUB_WORKSPACE -name "*.apk" -type f 2>/dev/null
          find $GITHUB_WORKSPACE -name "*.aab" -type f 2>/dev/null
          ls -la $GITHUB_WORKSPACE/apk-output/ 2>/dev/null || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: 芙pop-APK
          path: |
            ${{ github.workspace }}/apk-output/*.apk
            ${{ github.workspace }}/apk-output/*.aab
          if-no-files-found: warn
